<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titanic Survival Predictor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f5f4f0;
      --surface:    #ffffff;
      --border:     #e0dfd8;
      --text:       #1a1a18;
      --muted:      #6b6b66;
      --accent:     #2563eb;
      --accent-lt:  #eff6ff;
      --success:    #16a34a;
      --success-lt: #f0fdf4;
      --danger:     #dc2626;
      --danger-lt:  #fef2f2;
      --radius:     12px;
      --radius-sm:  8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      max-width: 560px;
    }
    header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }
    header p  { margin-top: 6px; color: var(--muted); font-size: 0.9rem; line-height: 1.6; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      width: 100%;
      max-width: 560px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input, select {
      height: 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 12px;
      font-size: 0.925rem;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input.error, select.error { border-color: var(--danger); }

    .hint { font-size: 0.75rem; color: var(--muted); }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .btn-submit {
      width: 100%;
      height: 44px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-submit:hover   { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Result card */
    #result {
      margin-top: 1.25rem;
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      display: none;
    }
    #result.survived     { background: var(--success-lt); border: 1px solid #bbf7d0; }
    #result.not-survived { background: var(--danger-lt);  border: 1px solid #fecaca; }
    #result.error-state  { background: #fff7ed;            border: 1px solid #fed7aa; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .result-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .survived     .result-icon { background: #dcfce7; }
    .not-survived .result-icon { background: #fee2e2; }
    .result-label { font-size: 1.1rem; font-weight: 700; }
    .survived     .result-label { color: var(--success); }
    .not-survived .result-label { color: var(--danger);  }
    .error-state  .result-label { color: #c2410c; }

    .prob-bar-wrap { margin-top: 10px; }
    .prob-label {
      display: flex; justify-content: space-between;
      font-size: 0.8rem; color: var(--muted); margin-bottom: 5px;
    }
    .prob-bar-bg {
      height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden;
    }
    .prob-bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 0.6s ease;
    }
    .survived     .prob-bar-fill { background: var(--success); }
    .not-survived .prob-bar-fill { background: var(--danger);  }

    .stats-row {
      display: flex; gap: 12px; margin-top: 12px;
    }
    .stat {
      flex: 1; background: rgba(255,255,255,0.6);
      border-radius: var(--radius-sm); padding: 8px 12px;
      text-align: center;
    }
    .stat-value { font-size: 1.1rem; font-weight: 700; }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error list */
    .error-list {
      margin: 0; padding: 0; list-style: none;
      font-size: 0.85rem; color: #c2410c;
    }
    .error-list li::before { content: "• "; }

    footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .field.full { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>Titanic Survival Predictor</h1>
  <p>Enter passenger details below. A Random Forest model trained on the Titanic
     dataset will estimate the probability of survival.</p>
</header>

<div class="card">
  <form id="pred-form" novalidate>
    <div class="form-grid">

      <!-- Age -->
      <div class="field">
        <label for="age">Age</label>
        <input id="age" name="Age" type="number" min="1" max="120"
               step="1" placeholder="e.g. 29" value="29" />
        <span class="hint">Years (1 – 120)</span>
      </div>

      <!-- Fare -->
      <div class="field">
        <label for="fare">Fare (£)</label>
        <input id="fare" name="Fare" type="number" min="0"
               step="0.01" placeholder="e.g. 32.50" value="32.50" />
      </div>

      <!-- Sex -->
      <div class="field">
        <label for="sex">Sex</label>
        <select id="sex" name="Sex">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

      <!-- Passenger class -->
      <div class="field">
        <label for="pclass">Passenger class</label>
        <select id="pclass" name="Pclass">
          <option value="1">1st class</option>
          <option value="2">2nd class</option>
          <option value="3" selected>3rd class</option>
        </select>
      </div>

      <!-- Title -->
      <div class="field">
        <label for="title">Title</label>
        <select id="title" name="Title">
          <option value="Mr" selected>Mr</option>
          <option value="Mrs">Mrs</option>
          <option value="Miss">Miss</option>
          <option value="Master">Master</option>
          <option value="Rare">Rare / Other</option>
        </select>
      </div>

      <!-- Embarked -->
      <div class="field">
        <label for="embarked">Embarked</label>
        <select id="embarked" name="Embarked">
          <option value="S" selected>Southampton (S)</option>
          <option value="C">Cherbourg (C)</option>
          <option value="Q">Queenstown (Q)</option>
        </select>
      </div>

      <!-- SibSp -->
      <div class="field">
        <label for="sibsp">Siblings / Spouses aboard</label>
        <input id="sibsp" name="SibSp" type="number"
               min="0" max="10" step="1" value="0" />
      </div>

      <!-- Parch -->
      <div class="field">
        <label for="parch">Parents / Children aboard</label>
        <input id="parch" name="Parch" type="number"
               min="0" max="10" step="1" value="0" />
      </div>

    </div>

    <hr class="divider" />

    <button class="btn-submit" type="submit" id="submit-btn">
      Predict survival
    </button>

    <!-- Result -->
    <div id="result" role="alert" aria-live="polite"></div>
  </form>
</div>

<footer>
  Model: Random Forest · Trained on Titanic dataset ·
  <a href="/health">Health check</a>
</footer>

<script>
  const form      = document.getElementById('pred-form');
  const submitBtn = document.getElementById('submit-btn');
  const resultEl  = document.getElementById('result');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    setLoading(true);
    clearResult();

    const data = collectFormData();

    try {
      const res  = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const json = await res.json();

      if (!res.ok) {
        showError(json.errors || [json.error || 'Unexpected error.']);
      } else {
        showResult(json);
      }
    } catch (err) {
      showError(['Could not reach the server. Please try again.']);
    } finally {
      setLoading(false);
    }
  });

  function collectFormData() {
    const fd = new FormData(form);
    const d  = {};
    for (const [k, v] of fd.entries()) {
      d[k] = isNaN(v) || v === '' ? v : parseFloat(v);
    }
    // Derive FamilySize
    d.FamilySize = (d.SibSp || 0) + (d.Parch || 0) + 1;
    return d;
  }

  function showResult(json) {
    const survived = json.survived === 1;
    const pct      = Math.round(json.probability * 100);
    const cls      = survived ? 'survived' : 'not-survived';
    const icon     = survived ? '🟢' : '🔴';
    const label    = json.message;

    resultEl.className = cls;
    resultEl.style.display = 'block';
    resultEl.innerHTML = `
      <div class="result-header">
        <div class="result-icon">${icon}</div>
        <div class="result-label">${label}</div>
      </div>
      <div class="prob-bar-wrap">
        <div class="prob-label">
          <span>Survival probability</span>
          <span>${pct}%</span>
        </div>
        <div class="prob-bar-bg">
          <div class="prob-bar-fill" id="bar" style="width:0%"></div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-value">${json.confidence}</div>
          <div class="stat-label">Confidence</div>
        </div>
        <div class="stat">
          <div class="stat-value">${survived ? 'Survived' : 'Perished'}</div>
          <div class="stat-label">Prediction</div>
        </div>
      </div>`;

    // Animate bar after paint
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const bar = document.getElementById('bar');
        if (bar) bar.style.width = pct + '%';
      });
    });
  }

  function showError(errors) {
    resultEl.className   = 'error-state';
    resultEl.style.display = 'block';
    const items = (Array.isArray(errors) ? errors : [errors])
      .map(e => `<li>${e}</li>`).join('');
    resultEl.innerHTML = `
      <div class="result-header">
        <div class="result-label">Validation error</div>
      </div>
      <ul class="error-list">${items}</ul>`;
  }

  function clearResult() {
    resultEl.style.display = 'none';
    resultEl.innerHTML = '';
    resultEl.className = '';
  }

  function setLoading(loading) {
    submitBtn.disabled = loading;
    submitBtn.innerHTML = loading
      ? '<div class="spinner"></div> Predicting…'
      : 'Predict survival';
  }
</script>
</body>
</html>
